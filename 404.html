<!DOCTYPE html>
<html lang="en" dir="ltr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Lot Not Found | VaultCard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: '#C1121F',
                        crimson: '#780000',
                        darkbg: '#050505',
                        panel: '#111111'
                    }
                }
            }
        };
    </script>

    <style>
        body { 
            overflow-x: hidden; 
            background-color: #050505;
        }

        /* VaultCard Signature Button */
        .vault-btn {
            background-color: #C1121F;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }
        .vault-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background-color: #780000;
            transition: all 0.3s ease;
            z-index: -1;
        }
        .vault-btn:hover::before {
            left: 0;
        }
    </style>
</head>
<body class="text-white font-sans antialiased min-h-screen flex flex-col selection:bg-primary selection:text-white">

    

    <main class="relative flex-grow flex items-center justify-center min-h-screen overflow-hidden">
        
        <div class="absolute inset-0 z-0">
            <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1618044733300-9472054094ee?q=80&w=2805&auto=format&fit=crop')] bg-cover bg-center opacity-30 grayscale blur-[2px] scale-105"></div>
            
            <div class="absolute inset-0 bg-gradient-to-b from-[#050505] via-transparent to-[#050505]"></div>
            <div class="absolute inset-0 bg-gradient-to-r from-[#050505] via-transparent to-[#050505]"></div>
            <div class="absolute inset-0 bg-black/60"></div>
        </div>

        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[30rem] h-[30rem] sm:w-[40rem] sm:h-[40rem] bg-primary/20 blur-[120px] rounded-full pointer-events-none mix-blend-screen z-0"></div>

        <div class="relative z-10 text-center px-4 w-full max-w-3xl mx-auto flex flex-col items-center">
            
            <div class="mb-8 relative inline-block">
                <div class="absolute inset-0 bg-primary blur-md opacity-40 animate-pulse"></div>
                <div class="relative bg-[#111] border border-gray-800 px-6 py-2 rounded-sm shadow-2xl flex items-center gap-4">
                    <div class="flex flex-col text-left">
                        <span class="text-[8px] font-black text-gray-500 uppercase tracking-widest leading-none">Status Code</span>
                        <span class="text-xs font-black text-white uppercase tracking-widest leading-none mt-1">Error</span>
                    </div>
                    <div class="w-px h-6 bg-gray-800"></div>
                    <span class="text-3xl font-black text-primary tracking-tighter leading-none">404</span>
                </div>
            </div>

            <h1 class="text-5xl sm:text-7xl md:text-8xl font-semibold uppercase tracking-tighter text-white leading-none mb-4 drop-shadow-2xl">
                Lost In The <span class="text-transparent bg-clip-text bg-gradient-to-b from-primary to-crimson">Vault.</span>
            </h1>
            
            <p class="text-base sm:text-lg md:text-xl text-gray-400 font-medium mb-12 max-w-xl mx-auto leading-relaxed">
                The auction lot or page you are looking for has been moved, sold, or does not exist. 
            </p>

            <div class="flex flex-col sm:flex-row gap-4 w-full sm:w-auto justify-center">
                <a href="shop.html" class="vault-btn px-10 py-4 text-white font-black uppercase tracking-widest text-xs rounded-sm shadow-xl shadow-primary/20 hover:-translate-y-0.5 transition-transform flex items-center justify-center gap-2">
                    <i class="fas fa-search text-white/70"></i> Browse Active Lots
                </a>
                <a href="index.html" class="px-10 py-4 bg-transparent border-2 border-white/20 text-white font-black uppercase tracking-widest text-xs rounded-sm hover:border-white hover:bg-white hover:text-black transition-all hover:-translate-y-0.5 flex items-center justify-center gap-2">
                    <i class="fas fa-home opacity-70"></i> Return Home
                </a>
            </div>

            <div class="mt-16 sm:mt-24 pt-8 border-t border-white/10 w-full max-w-md mx-auto flex flex-wrap justify-center gap-6 text-[10px] font-black uppercase tracking-widest text-gray-600">
                <a href="contact.html" class="hover:text-primary transition-colors">Contact Support</a>
                <a href="auctions.html" class="hover:text-primary transition-colors">Live Auctions</a>
                <a href="shop.html" class="hover:text-primary transition-colors">Consign</a>
            </div>
            
        </div>
    </main>

</body>
</html>
